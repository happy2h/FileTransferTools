# FileTransferServer Configuration
fts:
  port: 7111
  worker-threads: 8
  business-threads: 16
  read-timeout-seconds: 30
  outbound-read-timeout-seconds: 10
  connect-timeout-millis: 5000
  max-scan-results: 10000
  max-body-size: 10485760  # 10MB
  allowed-directories:
    - /data/files
    - /opt/transfer
    - /tmp
  decompress:
    fallback-enabled: true
    default-max-entries: 10000
    default-max-entry-size-mb: 500
    default-max-total-size-gb: 2

spring:
  application:
    name: file-transfer-client
